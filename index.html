<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title id="page-title">Brunch Dom José | Experiência Gastronómica em Caldelas</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,600&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="stylesheet" href="./style.css">
</head>
<body>

  <nav id="nav">
    <a href="#" class="flex items-center justify-center">
      <div class="logo-container">
        <img src="./images/logo.png" alt="Logo" onerror="this.style.display='none'; this.parentElement.innerHTML='<div class=\'w-full h-full bg-orange-200 rounded-lg flex items-center justify-center text-[10px] font-black text-orange-800\'>LOGO</div>'">
      </div>
    </a>
    <ul class="nav-links hidden md:flex" id="nav-list"></ul>
    <div class="flex items-center justify-end gap-4">
      <div class="relative hidden md:block">
        <button id="lang-btn" class="flex items-center gap-2 rounded-full border border-orange-100 bg-white px-3 py-1.5 f-xs font-bold text-orange-900 hover:bg-orange-50 transition-all uppercase">
          <span id="active-flag">🇵🇹</span> <span id="active-lang">PT</span> <i data-lucide="chevron-down" class="h-3 w-3"></i>
        </button>
        <div id="lang-menu" class="hidden absolute right-0 mt-2 w-40 rounded-xl overflow-hidden bg-white shadow-2xl border border-orange-50 z-50"></div>
      </div>
      <a href="tel:253471226" class="cta-button hidden md:inline-flex gap-2" id="cta-nav">
        <i data-lucide="phone" class="w-3.5 h-3.5"></i> <span id="cta-nav-text"></span>
      </a>
    </div>
  </nav>

  <section id="hero">
    <div class="max-w-5xl w-full flex flex-col items-center gap-8 relative z-10 px-4">
      <div class="reveal px-5 py-2 border border-orange-100 rounded-full f-xs font-black uppercase tracking-[0.3em] text-[var(--primary)] bg-white shadow-sm" id="hero-tag"></div>
      <h1 class="f-display text-orange-950 reveal">
        <span id="hero-static"></span><br>
        <span class="title-wrapper italic" id="title-rotator"></span>
      </h1>
      <p class="text-orange-900/70 f-lg max-w-2xl font-medium reveal" id="hero-sub"></p>
      <div class="reveal mt-4 flex flex-col sm:flex-row gap-4 w-full justify-center">
        <a href="#contacts" class="bg-[var(--primary)] text-white px-10 py-5 rounded-full font-bold f-base hover:brightness-110 transition-all flex items-center justify-center gap-3 shadow-xl">
          <span id="hero-cta-text"></span> <i data-lucide="calendar" class="w-5 h-5"></i>
        </a>
        <a href="#services" class="btn-secondary f-base">
          <span id="hero-menu-text"></span> <i data-lucide="arrow-down" class="w-5 h-5"></i>
        </a>
      </div>
    </div>
    <div id="scroll-indicator" class="absolute bottom-10 left-1/2 -translate-x-1/2 flex flex-col items-center gap-2 text-primary opacity-60 transition-opacity duration-500 pointer-events-none">
      <i class="fa-solid fa-chevron-down animate-bounce text-2xl"></i>
    </div>
  </section>

  <section id="services" class="!pb-0 overflow-x-hidden">
    <div class="max-w-[1200px] w-full mx-auto">
      <div class="mb-8 reveal">
        <h2 class="overline-text mb-4" id="services-overline"></h2>
        <h3 class="f-display text-orange-950 italic" id="services-title"></h3>
      </div>
      <div id="menu-gallery">
        <div class="gallery-container" id="gallery-track"></div>
      </div>
    </div>
  </section>

  <section id="about">
    <div class="max-w-[1100px] w-full mx-auto flex flex-col items-center reveal">
      <div class="about-image-placeholder">
        <img src="./images/restourant.webp" alt="Restaurant">
      </div>
      <h2 class="overline-text mb-4" id="about-mini"></h2>
      <h3 class="f-xl font-bold text-orange-950 mb-8 leading-tight italic" id="about-intro"></h3>
      <div id="about-desc" class="text-orange-900/70 space-y-6 f-base font-medium leading-relaxed text-center"></div>
    </div>
  </section>

  <section id="contacts">
    <div class="max-w-5xl mx-auto text-center reveal w-full">
      <h2 class="f-display text-orange-950 mb-6 italic" id="contact-title"></h2>
      <p class="f-lg text-orange-900/60 font-medium mb-12" id="contact-sub"></p>
      <div id="contact-pills" class="flex flex-col sm:flex-row justify-center gap-4 mb-16 w-full px-4"></div>
      <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 items-stretch">
        <div class="bg-white border border-orange-100 rounded-[32px] p-8 md:p-12 shadow-xl text-left flex flex-col justify-center">
          <h3 class="f-lg font-bold text-orange-950 mb-8 flex items-center gap-3">
            <i data-lucide="clock" class="w-6 h-6 text-[var(--primary)]"></i>
            <span id="hours-title"></span>
          </h3>
          <div id="hours-box" class="space-y-4"></div>
        </div>
        <div class="bg-orange-950 rounded-[32px] p-8 md:p-12 text-white text-left flex flex-col justify-between">
          <div>
            <h3 class="f-lg font-bold mb-2 flex items-center gap-3">
              <i data-lucide="share-2" class="w-6 h-6 text-orange-300"></i>
              Social
            </h3>
            <p class="text-orange-200/60 f-xs font-bold uppercase tracking-widest mb-6" id="social-tag">@domjosecoffeeandbrunch</p>
          </div>
          <div class="flex flex-col gap-6">
            <p class="text-orange-100/80 f-sm italic" id="social-cta"></p>
            <div class="flex gap-4">
              <a href="https://www.instagram.com/domjosecoffeeandbrunch/" class="p-4 bg-white/10 hover:bg-white/20 rounded-2xl transition-all text-2xl text-orange-200"><i class="fa-brands fa-instagram"></i></a>
              <a href="https://www.facebook.com/domjosecoffeeandbrunch/" class="p-4 bg-white/10 hover:bg-white/20 rounded-2xl transition-all text-2xl text-orange-200"><i class="fa-brands fa-facebook"></i></a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <footer class="bg-orange-950 text-white py-16 px-8 rounded-t-[60px] mt-20">
    <div class="max-w-[1100px] mx-auto text-center">
      <p class="f-xs text-orange-400/60 font-bold tracking-widest" id="footer-copy"></p>
    </div>
  </footer>

  <script src="./script.js"></script>
</body>
</html>
